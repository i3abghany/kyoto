# See: https://github.com/actions/starter-workflows/blob/main/ci/cmake-multi-platform.yml
name: Build and test on ubuntu

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  BUILD_TYPE: Release
  CCACHE_DIR: ~/.cache/ccache
  CCACHE_BASEDIR: ${{ github.workspace }}
  CCACHE_COMPILERCHECK: content
  CCACHE_MAXSIZE: 5G

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install LLVM
      run: |
        sudo apt remove llvm* clang* -y
        wget https://apt.llvm.org/llvm.sh
        chmod +x llvm.sh
        sudo ./llvm.sh 20 all

    # This may be a little excessive but works for the purposes of CI. This
    # helps Boost pick the correct header files as libstdc++ and libc++ conflict.
    - name: Remove libc++
      run: sudo apt purge libc++*

    - name: Make a symbolic link to lli-20
      run: sudo ln -s /usr/bin/lli-20 /usr/bin/lli

    - name: Install Prerequisites
      run: sudo apt update && sudo apt install libboost1.74-all-dev default-jre libfmt-dev ccache -y

    - name: Restore ccache
      uses: actions/cache@v4
      with:
        path: ~/.cache/ccache
        key: ${{ runner.os }}-ccache-${{ env.BUILD_TYPE }}-${{ hashFiles('CMakeLists.txt', 'cmake/**/*.cmake', 'grammar/*.g4', 'include/**/*.h', 'include/**/*.hpp', 'src/**/*.cpp', 'main.cpp', 'test/**/*.cpp') }}
        restore-keys: |
          ${{ runner.os }}-ccache-${{ env.BUILD_TYPE }}-

    - name: Download ANTLR4.13.2
      run: wget https://www.antlr.org/download/antlr-4.13.2-complete.jar -O ${{github.workspace}}/antlr-4.13.2-complete.jar && chmod +x ${{github.workspace}}/antlr-4.13.2-complete.jar

    - name: Zero ccache stats
      run: ccache --zero-stats

    - name: Configure CMake
      run: export PATH="${{github.workspace}}:$PATH" && echo $PATH && cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

    - name: Build tests
      run: cmake --build ${{github.workspace}}/build --target ktest --config ${{env.BUILD_TYPE}} -- -j4

    - name: ccache stats
      run: ccache --show-stats

    - name: Test
      working-directory: ${{github.workspace}}/build
      run: ./ktest
